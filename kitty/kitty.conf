# font_family FiraCode Nerd Font Mono
# font_family JetBrainsMono Nerd Font Mono
# font_family JetBrainsMonoNL Nerd Font
# font_family JetBrainsMono Nerd Font
# font_family 0xProto Nerd Font
# font_family TX-02
# font_family PragmataProMono
# font_family ComicShannsMono Nerd Font
# font_size 14
disable_ligatures never
confirm_os_window_close 0

allow_remote_control yes

cursor_trail 10
cursor_trail_decay 0.1 0.4

font_size 17
font_family PragmataPro Mono Liga
# font_features PragmataPro+Mono cv12=1 cv18=1
modify_font cell_height 1.4

hide_window_decorations yes

listen_on unix:/tmp/kitty
shell_integration enabled

# kitty-scrollback.nvim Kitten alias
action_alias kitty_scrollback_nvim kitten '/home/ogios/.local/share/nvim/lazy/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py'
# Browse scrollback buffer in nvim
map kitty_mod+alt+h kitty_scrollback_nvim
# Browse output of the last shell command in nvim
map kitty_mod+g kitty_scrollback_nvim --config ksb_builtin_last_cmd_output
# Show clicked command output in nvim
mouse_map ctrl+shift+right press ungrabbed combine : mouse_select_command_output : kitty_scrollback_nvim --config ksb_builtin_last_visited_cmd_output


# adjust_line_height 1
# adjust_column_width 1
# cursor #00ccff

window_padding_width 1
background_opacity  0.7
#background_opacity  0.94

action_alias launch_tab launch --type=tab --cwd=current
map ctrl+shift+n launch_tab

action_alias text send_text normal
map ctrl+shift+h no_op
# map ctrl+shift+alt+h show_scrollback

map ctrl+shift+h previous_tab
map ctrl+shift+l next_tab
map ctrl+tab no_op
map ctrl+shift+tab no_op

# map alt+shift+n send_text all \x1b[78;4u
# map ctrl+shift+j send_text all \x1b[74;5u
# map ctrl+f launch --type=overlay --stdin-source=@screen_scrollback /usr/bin/fzf --no-sort --no-mouse --exact -i


# BEGIN_KITTY_THEME
# Noctalia
include current-theme.conf
# END_KITTY_THEME
